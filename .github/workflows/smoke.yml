name: smoke

# Protects main and gives a status check on human PRs: runs the run-auto-dev smoke
# suite on every push to main and every PR targeting main.
#
# NOTE: PRs opened by the loop with the built-in GITHUB_TOKEN do NOT trigger this
# workflow (GitHub suppresses workflow-triggered events to prevent recursion). The
# loop therefore hard-gates on smoke itself before opening its PR (see auto-loop.yml).
# This workflow is the gate for HUMAN pushes/PRs and for the merge to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: run-auto-dev smoke suite
        run: bash .claude/skills/run-auto-dev/smoke.sh
